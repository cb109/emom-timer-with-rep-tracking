<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EMOM Timer</title>
  <script src="https://cdn.jsdelivr.net/npm/vue@3.5.31/dist/vue.global.min.js"></script>
  <style>
    :root {
      --bg: #e8ecef;
      --card-bg: #fff;
      --text: #4a5568;
      --text-muted: #6b7b8d;
      --text-heading: #2d3748;
      --accent: #2a7de1;
      --accent-hover: #1b65c1;
      --text-on-accent: #fff;
      --border: #9aa5b4;
      --btn-bg: #e2e8f0;
      --btn-text: #4a5568;
      --btn-hover: #cbd5e0;
      --active-bg: #d6e8fb;
      --input-border: #cbd5e0;
      --rep-btn-bg: #fff;
      --overlay-bg: rgba(0,0,0,0.35);
      --dialog-bg: #fff;
    }

    .dark {
      --bg: #1a202c;
      --card-bg: #2d3748;
      --text: #cbd5e0;
      --text-muted: #a0aec0;
      --text-heading: #e2e8f0;
      --accent: #ecc94b;
      --accent-hover: #d69e2e;
      --text-on-accent: #2d3748;
      --border: #4a5568;
      --btn-bg: #4a5568;
      --btn-text: #e2e8f0;
      --btn-hover: #718096;
      --active-bg: #2a4365;
      --input-border: #4a5568;
      --rep-btn-bg: #2d3748;
      --overlay-bg: rgba(0,0,0,0.55);
      --dialog-bg: #2d3748;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;

      /* outline: 1px solid red; */
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--bg);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      margin-top: 24px;
      padding: 24px;
      color: var(--text);
      transition: background 0.2s, color 0.2s;
    }

    #app {
      background: var(--card-bg);
      border-radius: 20px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 32px 36px;
      max-width: 400px;
      width: 100%;
    }

    @media (max-width: 599px) {
      body {
        background: var(--card-bg);
        margin-top: 0;
        padding: 0px;
      }
      #app {
        border-radius: 0;
        box-shadow: none;
        padding: 0;
        max-width: 100%;
      }
      .timer-section.running,
      .timer-section.finished {
        border-radius: 0;
      }
      .rounds-list {
        padding: 0px 14px;
      }
    }

    .timer-section {
      padding: 12px 8px;
      border-radius: 12px;
      margin-bottom: 8px;
      transition: background 0.25s, color 0.25s;
    }

    .timer-section.running {
      background: var(--accent);
    }

    .timer-section.running .timer-display {
      color: var(--card-bg);
    }

    .timer-section.running .round-display {
      color: var(--card-bg);
      opacity: 0.7;
    }

    .timer-section.finished {
      background: #38a169;
    }

    .timer-section.finished .timer-display {
      color: #fff;
    }

    .timer-section.finished .round-display {
      color: #fff;
      opacity: 0.7;
    }

    .timer-display {
      text-align: center;
      font-size: 7rem;
      font-weight: 700;
      line-height: 1.1;
      margin-top: 8px;
      color: var(--accent);
      letter-spacing: 2px;
      font-variant-numeric: tabular-nums;
    }

    .round-display {
      text-align: center;
      font-size: 1.7rem;
      color: var(--text-muted);
      font-weight: 600;
      margin-bottom: 8px;
    }

    .rounds-list {
      list-style: none;
      margin-bottom: 12px;
    }

    .round-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-radius: 8px;
      padding: 2px 0px;
      font-size: 1.15rem;
      color: var(--text);
      font-weight: 500;
    }

    .round-row.active {
      background: var(--active-bg);
      color: var(--accent);
    }

    .round-label {
      min-width: 100px;
      margin-left: 4px;
      cursor: pointer;
    }

    .round-label:hover {
      color: var(--accent);
    }

    .rep-controls {
      display: flex;
      align-items: center;
      margin-right: 4px;
      gap: 6px;
    }

    .rep-btn {
      width: 30px;
      height: 30px;
      margin: 2px;
      border: 2px solid var(--border);
      border-radius: 8px;
      background: var(--rep-btn-bg);
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      transition: border-color 0.15s, color 0.15s;
      line-height: 1;
    }

    .rep-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .round-row.active .rep-btn {
      border-color: var(--accent);
      color: var(--accent);
    }

    .rep-count {
      font-size: 1.5rem;
      font-weight: 700;
      min-width: 32px;
      text-align: center;
      color: inherit;
    }

    .controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 8px;
    }

    .controls button {
      padding: 10px 28px;
      font-size: 1.1rem;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-start {
      background: var(--accent);
      color: var(--text-on-accent)
    }

    .btn-start:hover {
      background: var(--accent-hover);
    }

    .btn-done {
      background: transparent;
      color: #38a169;
    }

    .btn-reset {
      background: var(--btn-bg);
      color: var(--btn-text);
    }

    .btn-reset:hover {
      background: var(--btn-hover);
    }

    .edit-btn {
      position: absolute;
      top: 4px;
      right: 4px;
      display: block;
      background: none;
      border: none;
      color: var(--btn-text);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      padding: 8px;
    }

    .edit-btn:hover {
      color: var(--accent);
    }

    .theme-btn {
      position: absolute;
      top: 4px;
      left: 4px;
      background: none;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 8px;
      color: var(--border);
      line-height: 1;
    }

    .theme-btn:hover {
      color: var(--accent);
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: var(--overlay-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .dialog {
      background: var(--dialog-bg);
      border-radius: 16px;
      padding: 28px 32px;
      width: 320px;
      max-width: 90vw;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    }

    .dialog h2 {
      margin: 0 0 18px 0;
      font-size: 1.3rem;
      color: var(--text-heading);
    }

    .dialog-field {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .dialog-field label {
      font-size: 1rem;
      color: var(--text);
      font-weight: 500;
    }

    .dialog-field input {
      width: 80px;
      padding: 6px 10px;
      font-size: 1rem;
      border: 2px solid var(--input-border);
      border-radius: 8px;
      text-align: center;
      background: var(--rep-btn-bg);
      color: var(--text);
    }

    .dialog-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 20px;
    }

    .dialog-actions button {
      padding: 8px 22px;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .dialog-cancel {
      background: var(--btn-bg);
      color: var(--btn-text);
    }

    .dialog-save {
      background: var(--accent);
      color: var(--text-on-accent);
    }
  </style>
</head>
<body>
  <div id="app">
    <button v-if="!running && !finished" class="theme-btn" @click="toggleTheme">
      <!-- dark -->
      <svg
        :style="{ filter: dark ? 'brightness(0.33) invert(1)' : 'none' }"
        width="24"
        height="24"
        viewBox="0 0 24 24"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
      >
        <path
          d="M12 16C14.2091 16 16 14.2091 16 12C16 9.79086 14.2091 8 12 8V16Z"
          fill="currentColor"
        />
        <path
          fill-rule="evenodd"
          clip-rule="evenodd"
          d="M12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2ZM12 4V8C9.79086 8 8 9.79086 8 12C8 14.2091 9.79086 16 12 16V20C16.4183 20 20 16.4183 20 12C20 7.58172 16.4183 4 12 4Z"
          fill="currentColor"
        />
      </svg>
    </button>
    <button v-if="!running && !finished" class="edit-btn" @click="openSettings">Edit</button>

    <div class="overlay" v-if="showSettings">
      <div class="dialog">
        <h2>Settings</h2>
        <div class="dialog-field">
          <label>Round time (s)</label>
          <input type="number" v-model.number="editSecondsPerRound" min="1">
        </div>
        <div class="dialog-field">
          <label>Rounds</label>
          <input type="number" v-model.number="editTotalRounds" min="1" max="99">
        </div>
        <div class="dialog-field">
          <label>Reps per round</label>
          <input type="number" v-model.number="editDefaultReps" min="0">
        </div>
        <div class="dialog-actions">
          <button class="dialog-cancel" @click="closeSettings">Cancel</button>
          <button class="dialog-save" @click="saveSettings">Save</button>
        </div>
      </div>
    </div>

    <div class="timer-section" :class="{ running: running, finished: finished }">
      <div class="timer-display">{{ formattedTime }}</div>
      <div class="round-display">Round: {{ currentRound }}/{{ totalRounds }}</div>
    </div>

    <ul class="rounds-list">
      <li
        v-for="round in totalRounds"
        :key="round"
        class="round-row"
        :class="{ active: round === currentRound }"
      >
        <span class="round-label" @click="jumpToRound(round)">Round {{ round }}:</span>
        <div class="rep-controls">
          <button class="rep-btn" @click="decReps(round)">−</button>
          <span class="rep-count">{{ reps[round - 1] }}</span>
          <button class="rep-btn" @click="incReps(round)">+</button>
        </div>
      </li>
    </ul>

    <div class="controls">
      <button :class="finished ? 'btn-done' : 'btn-start'" @click="toggle" :disabled="finished">{{ finished ? 'All done!' : (running ? 'Pause' : (elapsed > 0 ? 'Resume' : 'Start')) }}</button>
      <button class="btn-reset" @click="reset">Reset</button>
    </div>
  </div>

  <script>
    const { createApp, ref, computed, onUnmounted } = Vue;

    createApp({
      setup() {
        const saved = JSON.parse(localStorage.getItem('emomSettings') || 'null');
        const totalRounds = ref(saved?.totalRounds || 10);
        const secondsPerRound = ref(saved?.secondsPerRound || 60);
        const defaultReps = ref(saved?.defaultReps ?? 10);

        const reps = ref(Array(totalRounds.value).fill(defaultReps.value));
        const elapsed = ref(0);
        const running = ref(false);
        let intervalId = null;

        const showSettings = ref(false);
        const editTotalRounds = ref(totalRounds.value);
        const editSecondsPerRound = ref(secondsPerRound.value);
        const editDefaultReps = ref(defaultReps.value);

        const dark = ref(localStorage.getItem('emomTheme') === 'dark');
        if (dark.value) document.documentElement.classList.add('dark');

        function toggleTheme() {
          dark.value = !dark.value;
          document.documentElement.classList.toggle('dark', dark.value);
          localStorage.setItem('emomTheme', dark.value ? 'dark' : 'light');
        }

        const currentRound = computed(() => {
          const r = Math.floor(elapsed.value / secondsPerRound.value) + 1;
          return Math.min(r, totalRounds.value);
        });

        const timeInRound = computed(() => {
          return secondsPerRound.value - (elapsed.value % secondsPerRound.value);
        });

        const formattedTime = computed(() => {
          if (finished.value) return '00:00';
          const t = timeInRound.value;
          const m = Math.floor(t / 60);
          const s = t % 60;
          return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
        });

        const finished = computed(() => elapsed.value >= totalRounds.value * secondsPerRound.value);

        let audioCtx = null;
        function beep(freq = 660, duration = 120) {
          if (!audioCtx) audioCtx = new AudioContext();
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.frequency.value = freq;
          osc.type = 'sine';
          gain.gain.value = 0.15;
          osc.start();
          gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration / 1000);
          osc.stop(audioCtx.currentTime + duration / 1000);
        }

        function tick() {
          if (finished.value) {
            stop();
            return;
          }
          elapsed.value++;
          if (elapsed.value % secondsPerRound.value === 0) {
            if (finished.value) {
              beep(523, 120); beep(659, 120); setTimeout(() => beep(784, 200), 150);
            } else {
              beep(880, 150);
            }
          }
          if (finished.value) {
            stop();
          }
        }

        function start() {
          if (finished.value) return;
          running.value = true;
          beep(660, 120);
          intervalId = setInterval(tick, 1000);
        }

        function stop() {
          running.value = false;
          clearInterval(intervalId);
          intervalId = null;
        }

        function toggle() {
          running.value ? stop() : start();
        }

        function reset() {
          stop();
          elapsed.value = 0;
          reps.value = Array(totalRounds.value).fill(defaultReps.value);
        }

        function incReps(round) {
          reps.value[round - 1]++;
        }

        function decReps(round) {
          if (reps.value[round - 1] > 0) {
            reps.value[round - 1]--;
          }
        }

        function jumpToRound(round) {
          if (confirm('Jump to Round ' + round + '?')) {
            stop();
            elapsed.value = (round - 1) * secondsPerRound.value;
          }
        }

        function openSettings() {
          editTotalRounds.value = totalRounds.value;
          editSecondsPerRound.value = secondsPerRound.value;
          editDefaultReps.value = defaultReps.value;
          showSettings.value = true;
        }

        function closeSettings() {
          showSettings.value = false;
        }

        function saveSettings() {
          const newRounds = Math.max(1, editTotalRounds.value || 1);
          const newSeconds = Math.max(1, editSecondsPerRound.value || 1);
          const newReps = Math.max(0, editDefaultReps.value || 0);

          stop();
          totalRounds.value = newRounds;
          secondsPerRound.value = newSeconds;
          defaultReps.value = newReps;
          elapsed.value = 0;
          reps.value = Array(newRounds).fill(newReps);
          localStorage.setItem('emomSettings', JSON.stringify({
            totalRounds: newRounds,
            secondsPerRound: newSeconds,
            defaultReps: newReps,
          }));
          showSettings.value = false;
        }

        onUnmounted(() => {
          clearInterval(intervalId);
        });

        return {
          totalRounds,
          reps,
          elapsed,
          running,
          finished,
          currentRound,
          formattedTime,
          showSettings,
          editTotalRounds,
          editSecondsPerRound,
          editDefaultReps,
          dark,
          toggleTheme,
          toggle,
          reset,
          incReps,
          decReps,
          jumpToRound,
          openSettings,
          closeSettings,
          saveSettings,
        };
      }
    }).mount('#app');
  </script>
</body>
</html>
