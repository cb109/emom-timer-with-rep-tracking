<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EMOM Timer</title>
  <script src="https://cdn.jsdelivr.net/npm/vue@3.5.31/dist/vue.global.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;

      /* outline: 1px solid red; */
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #e8ecef;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      margin-top: 24px;
      padding: 24px;
    }

    #app {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 32px 36px;
      max-width: 400px;
      width: 100%;
    }

    @media (max-width: 599px) {
      body {
        background: #fff;
        margin-top: 0;
        padding: 12px 14px;
      }
      #app {
        border-radius: 0;
        box-shadow: none;
        padding: 0;
        max-width: 100%;
      }
    }

    .timer-display {
      text-align: center;
      font-size: 5rem;
      font-weight: 700;
      color: #2a7de1;
      letter-spacing: 2px;
      font-variant-numeric: tabular-nums;
    }

    .round-display {
      text-align: center;
      font-size: 2.2rem;
      color: #6b7b8d;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .rounds-list {
      list-style: none;
      margin-bottom: 24px;
    }

    .round-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-radius: 8px;
      padding: 2px 0px;
      font-size: 1.15rem;
      color: #4a5568;
      font-weight: 500;
    }

    .round-row.active {
      background: #d6e8fb;
      color: #2a7de1;
    }

    .round-label {
      min-width: 100px;
      margin-left: 4px;
      cursor: pointer;
    }

    .round-label:hover {
      color: #2a7de1;
    }

    .rep-controls {
      display: flex;
      align-items: center;
      margin-right: 4px;
      gap: 6px;
    }

    .rep-btn {
      width: 30px;
      height: 30px;
      margin: 2px;
      border: 2px solid #9aa5b4;
      border-radius: 8px;
      background: #fff;
      font-size: 1.2rem;
      font-weight: 700;
      color: #4a5568;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      transition: border-color 0.15s, color 0.15s;
      line-height: 1;
    }

    .rep-btn:hover {
      border-color: #2a7de1;
      color: #2a7de1;
    }

    .round-row.active .rep-btn {
      border-color: #2a7de1;
      color: #2a7de1;
    }

    .rep-count {
      font-size: 1.5rem;
      font-weight: 700;
      min-width: 32px;
      text-align: center;
      color: inherit;
    }

    .controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 8px;
    }

    .controls button {
      padding: 10px 28px;
      font-size: 1.1rem;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-start {
      background: #2a7de1;
      color: #fff;
    }

    .btn-start:hover {
      background: #1b65c1;
    }

    .btn-done {
      background: #38a169;
      color: #fff;
    }

    .btn-done:hover {
      background: #2f855a;
    }

    .btn-reset {
      background: #e2e8f0;
      color: #4a5568;
    }

    .btn-reset:hover {
      background: #cbd5e0;
    }

    .edit-btn {
      position: absolute;
      top: 8px;
      right: 12px;
      display: block;
      background: none;
      border: none;
      color: #9aa5b4;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      padding: 8px;
    }

    .edit-btn:hover {
      color: #2a7de1;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .dialog {
      background: #fff;
      border-radius: 16px;
      padding: 28px 32px;
      width: 320px;
      max-width: 90vw;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    }

    .dialog h2 {
      margin: 0 0 18px 0;
      font-size: 1.3rem;
      color: #2d3748;
    }

    .dialog-field {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .dialog-field label {
      font-size: 1rem;
      color: #4a5568;
      font-weight: 500;
    }

    .dialog-field input {
      width: 80px;
      padding: 6px 10px;
      font-size: 1rem;
      border: 2px solid #cbd5e0;
      border-radius: 8px;
      text-align: center;
    }

    .dialog-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 20px;
    }

    .dialog-actions button {
      padding: 8px 22px;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .dialog-cancel {
      background: #e2e8f0;
      color: #4a5568;
    }

    .dialog-save {
      background: #2a7de1;
      color: #fff;
    }
  </style>
</head>
<body>
  <div id="app">
    <button class="edit-btn" @click="openSettings">Edit</button>

    <div class="overlay" v-if="showSettings">
      <div class="dialog">
        <h2>Settings</h2>
        <div class="dialog-field">
          <label>Round time (s)</label>
          <input type="number" v-model.number="editSecondsPerRound" min="1">
        </div>
        <div class="dialog-field">
          <label>Rounds</label>
          <input type="number" v-model.number="editTotalRounds" min="1" max="99">
        </div>
        <div class="dialog-field">
          <label>Reps per round</label>
          <input type="number" v-model.number="editDefaultReps" min="0">
        </div>
        <div class="dialog-actions">
          <button class="dialog-cancel" @click="closeSettings">Cancel</button>
          <button class="dialog-save" @click="saveSettings">Save</button>
        </div>
      </div>
    </div>

    <div class="timer-display">{{ formattedTime }}</div>
    <div class="round-display">Round: {{ currentRound }}/{{ totalRounds }}</div>

    <ul class="rounds-list">
      <li
        v-for="round in totalRounds"
        :key="round"
        class="round-row"
        :class="{ active: round === currentRound }"
      >
        <span class="round-label" @click="jumpToRound(round)">Round {{ round }}:</span>
        <div class="rep-controls">
          <button class="rep-btn" @click="decReps(round)">−</button>
          <span class="rep-count">{{ reps[round - 1] }}</span>
          <button class="rep-btn" @click="incReps(round)">+</button>
        </div>
      </li>
    </ul>

    <div class="controls">
      <button :class="finished ? 'btn-done' : 'btn-start'" @click="toggle" :disabled="finished">{{ finished ? 'Done!' : (running ? 'Pause' : (elapsed > 0 ? 'Resume' : 'Start')) }}</button>
      <button class="btn-reset" @click="reset">Reset</button>
    </div>
  </div>

  <script>
    const { createApp, ref, computed, onUnmounted } = Vue;

    createApp({
      setup() {
        const saved = JSON.parse(localStorage.getItem('emomSettings') || 'null');
        const totalRounds = ref(saved?.totalRounds || 10);
        const secondsPerRound = ref(saved?.secondsPerRound || 60);
        const defaultReps = ref(saved?.defaultReps ?? 10);

        const reps = ref(Array(totalRounds.value).fill(defaultReps.value));
        const elapsed = ref(0);
        const running = ref(false);
        let intervalId = null;

        const showSettings = ref(false);
        const editTotalRounds = ref(totalRounds.value);
        const editSecondsPerRound = ref(secondsPerRound.value);
        const editDefaultReps = ref(defaultReps.value);

        const currentRound = computed(() => {
          const r = Math.floor(elapsed.value / secondsPerRound.value) + 1;
          return Math.min(r, totalRounds.value);
        });

        const timeInRound = computed(() => {
          return secondsPerRound.value - (elapsed.value % secondsPerRound.value);
        });

        const formattedTime = computed(() => {
          if (finished.value) return '00:00';
          const t = timeInRound.value;
          const m = Math.floor(t / 60);
          const s = t % 60;
          return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
        });

        const finished = computed(() => elapsed.value >= totalRounds.value * secondsPerRound.value);

        function tick() {
          if (finished.value) {
            stop();
            return;
          }
          elapsed.value++;
          if (finished.value) {
            stop();
          }
        }

        function start() {
          if (finished.value) return;
          running.value = true;
          intervalId = setInterval(tick, 1000);
        }

        function stop() {
          running.value = false;
          clearInterval(intervalId);
          intervalId = null;
        }

        function toggle() {
          running.value ? stop() : start();
        }

        function reset() {
          stop();
          elapsed.value = 0;
          reps.value = Array(totalRounds.value).fill(defaultReps.value);
        }

        function incReps(round) {
          reps.value[round - 1]++;
        }

        function decReps(round) {
          if (reps.value[round - 1] > 0) {
            reps.value[round - 1]--;
          }
        }

        function jumpToRound(round) {
          if (confirm('Jump to Round ' + round + '?')) {
            stop();
            elapsed.value = (round - 1) * secondsPerRound.value;
          }
        }

        function openSettings() {
          editTotalRounds.value = totalRounds.value;
          editSecondsPerRound.value = secondsPerRound.value;
          editDefaultReps.value = defaultReps.value;
          showSettings.value = true;
        }

        function closeSettings() {
          showSettings.value = false;
        }

        function saveSettings() {
          const newRounds = Math.max(1, editTotalRounds.value || 1);
          const newSeconds = Math.max(1, editSecondsPerRound.value || 1);
          const newReps = Math.max(0, editDefaultReps.value || 0);

          stop();
          totalRounds.value = newRounds;
          secondsPerRound.value = newSeconds;
          defaultReps.value = newReps;
          elapsed.value = 0;
          reps.value = Array(newRounds).fill(newReps);
          localStorage.setItem('emomSettings', JSON.stringify({
            totalRounds: newRounds,
            secondsPerRound: newSeconds,
            defaultReps: newReps,
          }));
          showSettings.value = false;
        }

        onUnmounted(() => {
          clearInterval(intervalId);
        });

        return {
          totalRounds,
          reps,
          elapsed,
          running,
          finished,
          currentRound,
          formattedTime,
          showSettings,
          editTotalRounds,
          editSecondsPerRound,
          editDefaultReps,
          toggle,
          reset,
          incReps,
          decReps,
          jumpToRound,
          openSettings,
          closeSettings,
          saveSettings,
        };
      }
    }).mount('#app');
  </script>
</body>
</html>
